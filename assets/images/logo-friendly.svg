<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Friendly: 둥근 느낌 + 따뜻한 컬러 포인트 + 동전 아이콘 -->
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#warm)"/>
  <!-- 동전 원 -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- 원화 기호 -->
  <text x="24" y="30" text-anchor="middle" fill="white" font-family="'Noto Sans KR',sans-serif" font-weight="800" font-size="18">\u20A9</text>
  <!-- 텍스트 -->
  <text x="54" y="20" fill="#1e3a8a" font-family="'Noto Sans KR',sans-serif" font-weight="800" font-size="18">국민</text><text x="96" y="20" fill="#3b82f6" font-family="'Noto Sans KR',sans-serif" font-weight="800" font-size="18">계산기</text>
  <text x="54" y="38" fill="#94a3b8" font-family="'Noto Sans KR',sans-serif" font-weight="400" font-size="10">누구나 쉽고 편하게</text>
</svg>
